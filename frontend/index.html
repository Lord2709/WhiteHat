<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VulnPriority AI — Agentic Vulnerability Prioritization</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg0:#040912;--bg1:#080f1e;--bg2:#0c1428;--bg3:#111d35;--bg4:#162040;
    --primary:#00d4aa;--primary-dim:rgba(0,212,170,.12);--primary-glow:rgba(0,212,170,.35);
    --secondary:#7c3aed;--sec-dim:rgba(124,58,237,.15);
    --danger:#ff4757;--danger-dim:rgba(255,71,87,.12);
    --warning:#f59e0b;--warn-dim:rgba(245,158,11,.12);
    --success:#10b981;--succ-dim:rgba(16,185,129,.12);
    --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);
    --pink:#ec4899;--pink-dim:rgba(236,72,153,.12);
    --text0:#f0f6ff;--text1:#c8d8ed;--text2:#7a8fa6;--text3:#4a5e72;
    --border:rgba(0,212,170,.1);--border2:rgba(255,255,255,.06);
    --mono:'JetBrains Mono','Fira Code',monospace;--sans:'Inter',sans-serif;
    --radius:12px;--radius-sm:8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg0);color:var(--text1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg1)}
  ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
  .app-shell{display:flex;flex-direction:column;min-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:rgba(8,15,30,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-text{font-size:18px;font-weight:700;letter-spacing:-.4px;color:var(--text0)}
  .logo-text span{color:var(--primary)}
  .logo-badge{font-size:10px;font-family:var(--mono);background:var(--primary-dim);color:var(--primary);border:1px solid var(--border);border-radius:4px;padding:2px 7px;letter-spacing:.5px}
  .topbar-right{display:flex;align-items:center;gap:16px}
  .status-dot{width:8px;height:8px;border-radius:50%}
  .status-dot.green{background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse-dot 2s infinite}
  .status-dot.orange{background:var(--warning);box-shadow:0 0 8px var(--warning)}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
  .page-nav{display:flex;gap:4px}
  .nav-step{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .2s}
  .nav-step.active{background:var(--primary-dim);color:var(--primary)}
  .nav-step.done{color:var(--success)}
  .nav-num{width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);flex-shrink:0}
  .page{padding:32px 28px;max-width:1300px;margin:0 auto;width:100%;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
  .card-header{padding:14px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
  .card-title{font-size:14px;font-weight:600;color:var(--text0)}
  .card-body{padding:20px}
  .config-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:900px){.config-grid{grid-template-columns:1fr}}
  .section-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--primary);margin-bottom:10px}
  .drop-zone{border:2px dashed rgba(0,212,170,.25);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--primary-dim)}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);background:rgba(0,212,170,.18)}
  .drop-zone-icon{font-size:32px;margin-bottom:8px}
  .drop-zone-title{font-size:14px;font-weight:600;color:var(--text0);margin-bottom:3px}
  .drop-zone-sub{font-size:12px;color:var(--text2)}
  .va-drop-zone{border:2px dashed rgba(124,58,237,.3);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--sec-dim)}
  .va-drop-zone:hover,.va-drop-zone.drag-over{border-color:var(--secondary);background:rgba(124,58,237,.2)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;font-weight:500;color:var(--text2)}
  .field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text0);padding:9px 12px;font-size:13px;font-family:var(--sans);outline:none;transition:border-color .2s}
  .field input:focus,.field select:focus{border-color:var(--primary)}
  .field input::placeholder{color:var(--text3)}
  .field select option{background:var(--bg3)}
  .field-group{display:flex;flex-direction:column;gap:12px}
  .checkbox-group{display:flex;gap:8px;flex-wrap:wrap}
  .checkbox-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;user-select:none}
  .checkbox-item.checked{background:var(--sec-dim);border-color:var(--secondary);color:#a78bfa}
  .checkbox-item input{display:none}
  .team-member-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2);animation:slideIn .2s ease}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
  .member-name{font-size:13px;font-weight:600;color:var(--text0)}
  .member-skills{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
  .skill-tag{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:var(--blue-dim);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
  .sprint-input{width:70px;padding:4px 8px;font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--primary);text-align:center}
  .window-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2)}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--sans)}
  .btn-primary{background:var(--primary);color:#000}
  .btn-primary:hover{background:#00f0c5;transform:translateY(-1px);box-shadow:0 4px 20px var(--primary-glow)}
  .btn-primary:disabled{opacity:.4;transform:none;cursor:not-allowed}
  .btn-outline{background:transparent;color:var(--text1);border:1px solid var(--border2)}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn-ghost{background:transparent;color:var(--text2);padding:4px 8px;font-size:12px}
  .btn-ghost:hover{color:var(--danger)}
  .btn-purple{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
  .btn-purple:hover{background:rgba(124,58,237,.35)}
  .packages-preview{max-height:200px;overflow-y:auto;background:var(--bg0);border-radius:var(--radius-sm);padding:12px;font-family:var(--mono);font-size:11px;color:var(--text2)}
  .pkg-row{display:flex;justify-content:space-between;padding:2px 0}
  .pkg-name{color:var(--primary)}
  .pkg-ver{color:var(--text3)}
  .cve-pill{font-family:var(--mono);font-size:10px;padding:3px 8px;background:var(--sec-dim);color:#a78bfa;border:1px solid rgba(124,58,237,.25);border-radius:5px;cursor:default}

  /* ─── Pipeline ─── */
  .pipeline-container{display:grid;grid-template-columns:360px 1fr;gap:24px;max-width:1240px;margin:0 auto}
  @media(max-width:900px){.pipeline-container{grid-template-columns:1fr}}
  .step-list{display:flex;flex-direction:column;gap:0}
  .step-item{display:flex;gap:14px;padding:13px 18px;border-radius:0;transition:background .2s;position:relative}
  .step-item:first-child{border-radius:var(--radius) var(--radius) 0 0}
  .step-item:last-child{border-radius:0 0 var(--radius) var(--radius)}
  .step-item.active{background:var(--primary-dim)}
  .step-item.done{background:var(--succ-dim)}
  .step-connector{position:absolute;left:34px;top:50px;width:2px;background:var(--border2);height:calc(100% - 8px);z-index:0}
  .step-connector.done{background:var(--success)}
  .step-icon-wrap{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--border2);background:var(--bg2);position:relative;z-index:1;transition:all .3s}
  .step-icon-wrap.running{border-color:var(--primary);background:var(--primary-dim);animation:spin-ring 1s linear infinite}
  .step-icon-wrap.done{border-color:var(--success);background:var(--succ-dim)}
  .step-icon-wrap.error{border-color:var(--danger);background:var(--danger-dim)}
  @keyframes spin-ring{0%{box-shadow:0 0 0 2px var(--primary-glow)}50%{box-shadow:0 0 12px 4px var(--primary-glow)}100%{box-shadow:0 0 0 2px var(--primary-glow)}}
  .step-info{flex:1;min-width:0}
  .step-name{font-size:12px;font-weight:600;color:var(--text0);margin-bottom:3px;display:flex;align-items:center;gap:8px}
  .step-msg{font-size:10.5px;color:var(--text2);font-family:var(--mono);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .step-badge{font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 6px;border-radius:4px}
  .step-badge.running{background:var(--primary-dim);color:var(--primary)}
  .step-badge.done{background:var(--succ-dim);color:var(--success)}
  .step-badge.pending{background:var(--bg3);color:var(--text3)}
  .step-badge.error{background:var(--danger-dim);color:var(--danger)}
  .log-panel{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;height:580px}
  .log-header{padding:12px 16px;border-bottom:1px solid var(--border2);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px}
  .log-body{flex:1;overflow-y:auto;padding:12px 16px;font-family:var(--mono);font-size:11px;display:flex;flex-direction:column;gap:3px}
  .log-line{display:flex;gap:10px;animation:fadeIn .15s ease}
  .log-time{color:var(--text3);flex-shrink:0}
  .log-text{color:var(--text1);line-height:1.5}
  .log-text.success{color:var(--success)}
  .log-text.warn{color:var(--warning)}
  .log-text.error{color:var(--danger)}
  .log-text.info{color:#60a5fa}
  .progress-bar-wrap{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:20px}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#00a8ff);border-radius:2px;transition:width .4s ease}

  /* ─── Results ─── */
  .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:24px;overflow-x:auto}
  .tab-btn{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .tab-btn:hover{color:var(--text0)}
  .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
  .tab-count{font-size:10px;background:var(--bg3);padding:2px 6px;border-radius:10px;font-family:var(--mono)}
  .tab-btn.active .tab-count{background:var(--primary-dim);color:var(--primary)}

  /* ─── Stats ─── */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
  .stat-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 18px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--primary))}
  .stat-val{font-size:26px;font-weight:800;font-family:var(--mono);color:var(--text0);line-height:1;margin-bottom:4px}
  .stat-label{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.8px}
  .stat-sub{font-size:10px;color:var(--text3);margin-top:3px}

  /* ─── Exec summary ─── */
  .exec-box{background:linear-gradient(135deg,rgba(0,212,170,.06),rgba(124,58,237,.06));border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:22px}
  .exec-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--primary);font-weight:700;margin-bottom:8px}
  .exec-text{font-size:14px;line-height:1.7;color:var(--text0)}

  /* ─── Vuln table ─── */
  .vuln-table{width:100%;border-collapse:collapse}
  .vuln-table th{padding:9px 13px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap}
  .vuln-row{border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
  .vuln-row:hover{background:rgba(255,255,255,.02)}
  .vuln-row.expanded{background:rgba(0,212,170,.04)}
  .vuln-row td{padding:11px 13px;vertical-align:middle}
  .vuln-expand td{padding:16px 20px;background:var(--bg3);animation:slideDown .2s ease}
  @keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .rank-badge{width:26px;height:26px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text2)}
  .rank-badge.top3{background:rgba(245,158,11,.15);color:var(--warning)}
  .rank-badge.rank1{background:rgba(255,71,87,.15);color:var(--danger)}
  .cve-id{font-family:var(--mono);font-size:12px;color:var(--primary);font-weight:500}
  .pkg-chip{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:5px;background:var(--bg4);color:var(--text1);border:1px solid var(--border2)}
  .cvss-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap}
  .cvss-critical{background:rgba(255,71,87,.15);color:var(--danger);border:1px solid rgba(255,71,87,.25)}
  .cvss-high{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.25)}
  .cvss-medium{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
  .cvss-low{background:var(--succ-dim);color:var(--success);border:1px solid rgba(16,185,129,.25)}
  .cvss-pending{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.25)}
  .poc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:var(--mono);white-space:nowrap}
  .poc-yes{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.25)}
  .poc-no{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}
  .viability-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:var(--mono)}
  .v-high{background:rgba(255,71,87,.15);color:var(--danger);border:1px solid rgba(255,71,87,.25)}
  .v-medium{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.25)}
  .v-low{background:var(--succ-dim);color:var(--success);border:1px solid rgba(16,185,129,.25)}
  .score-pill{font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--primary-dim);color:var(--primary);border:1px solid rgba(0,212,170,.2)}
  .score-pill.high{background:rgba(255,71,87,.12);color:#ff7580;border-color:rgba(255,71,87,.2)}
  .score-pill.med{background:rgba(245,158,11,.12);color:#fbbf24;border-color:rgba(245,158,11,.2)}
  .blast-num{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--secondary)}
  .rationale-box{background:var(--bg2);border-left:3px solid var(--primary);padding:12px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:12.5px;line-height:1.65;color:var(--text1);margin-bottom:10px}
  .systems-list{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .system-chip{font-size:10px;font-family:var(--mono);padding:3px 8px;background:var(--sec-dim);color:#a78bfa;border-radius:4px;border:1px solid rgba(124,58,237,.2)}

  /* ─── Exploits tab ─── */
  .exploit-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
  .exploit-card-header{padding:14px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .exploit-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .exploit-code-wrap{position:relative}
  .exploit-code-wrap pre{margin:0!important;border-radius:0!important;max-height:400px;overflow-y:auto}
  .exploit-code-wrap code{font-family:var(--mono)!important;font-size:12px!important;line-height:1.6!important}
  .poc-generate-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:16px;background:var(--bg1);border-bottom:1px solid var(--border2)}
  .poc-generate-btn{display:flex;align-items:center;gap:10px;padding:12px 28px;border-radius:10px;border:1.5px solid var(--danger);background:rgba(255,71,87,.08);color:var(--danger);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;font-family:var(--sans)}
  .poc-generate-btn:hover{background:rgba(255,71,87,.18);box-shadow:0 0 18px rgba(255,71,87,.25)}
  .poc-generate-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
  .poc-lang-selector{display:flex;gap:8px}
  .poc-lang-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--mono);transition:all .15s}
  .poc-lang-btn.active{border-color:var(--danger);color:var(--danger);background:rgba(255,71,87,.08)}
  .poc-warning{font-size:11px;color:var(--text3);text-align:center;max-width:480px;line-height:1.5}
  .copy-btn{position:absolute;top:10px;right:10px;padding:4px 10px;font-size:10px;font-family:var(--mono);background:rgba(0,0,0,.5);color:var(--text2);border:1px solid var(--border2);border-radius:5px;cursor:pointer;transition:all .15s;z-index:10}
  .copy-btn:hover{color:var(--primary);border-color:var(--primary)}
  .exploit-eval{padding:16px 18px;border-top:1px solid var(--border2)}
  .eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:700px){.eval-grid{grid-template-columns:1fr}}
  .eval-section-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
  .eval-steps{display:flex;flex-direction:column;gap:5px}
  .eval-step{font-size:12px;color:var(--text1);padding:6px 10px;background:var(--bg3);border-radius:6px;border-left:2px solid var(--primary-dim);line-height:1.5}
  .eval-step.remediation{border-left-color:var(--warning)}
  .eval-step.verification{border-left-color:var(--success)}
  .lang-badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;font-weight:700}
  .lang-python{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
  .lang-bash{background:rgba(16,185,129,.15);color:var(--success);border:1px solid rgba(16,185,129,.25)}
  .lang-javascript{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.25)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API_URL = 'http://localhost:8000';

const STORAGE_KEYS = {
  page: 'whitehat-ui-page-v1',
  config: 'whitehat-ui-config-v1',
  results: 'whitehat-ui-latest-results-v1',
  history: 'whitehat-ui-scan-history-v1',
  exploitLang: 'whitehat-ui-exploit-lang-v1',
  pocState: 'whitehat-ui-poc-state-v1',
  lastRequest: 'whitehat-ui-last-request-v1',
};

function readStoredJSON(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

function writeStoredJSON(key, value) {
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
  } catch {
    return;
  }
}

// ─── Helpers ────────────────────────────────────────────────────────────────
const cvssClass  = (s,p) => p||s===0?'cvss-pending':s>=9?'cvss-critical':s>=7?'cvss-high':s>=4?'cvss-medium':'cvss-low';
const cvssLabel  = (s,p,src) => {
  if (p||s===0) return 'NVD PENDING';
  const sev = s>=9?'CRITICAL':s>=7?'HIGH':s>=4?'MEDIUM':'LOW';
  if (src==='nvd-primary') return sev;           // NVD assigned — no suffix
  if (src==='nvd-cna')     return sev+' (CNA)';  // NVD has it but not yet scored by NIST
  if (src==='osv-cna')     return sev+' (CNA)';  // OSV-only fallback
  return sev;
};
const sourceDetailLabel = s => s==='nvd-primary'?'NVD/NIST':s==='osv-cna'?'CNA / OSV fallback':s==='nvd'?'NVD/NIST':s==='osv'?'OSV summary':'—';
const scoreClass = s => s>80?'high':s>30?'med':'';
const pClass     = p => `p-${(p||'medium').toLowerCase()}`;
const vClass     = v => v==='High'?'v-high':v==='Low'?'v-low':'v-medium';
const langClass  = l => `lang-${(l||'python').toLowerCase()}`;
const now        = () => new Date().toLocaleTimeString('en-US',{hour12:false});
const initials   = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const avatarClr  = n => {const h=[...n].reduce((a,c)=>a+c.charCodeAt(0),0);return ['#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899'][h%6];};
const sourceBadge = s => s==='va-report'?'source-va':s==='nvd-sca'||s==='nvd'||s==='nvd-verified'?'source-nvd':s==='osv'?'source-osv':s==='llm-fallback'?'source-llm-fallback':'source-demo';
const sourceLabel = s => s==='va-report'?'VA':s==='nvd-sca'||s==='nvd'?'NVD':s==='nvd-verified'?'NVD ✓':s==='osv'?'OSV ✓':s==='llm-fallback'?'LLM?':'DEMO';

const teamProfileToMember = p => ({
  name: p?.name || 'Engineer',
  email: p?.email || '',
  role: p?.role || '',
  linkedin_url: p?.linkedin_url || '',
  professional_summary: p?.professional_summary || '',
  expertise: Array.isArray(p?.expertise) ? p.expertise : [],
  availability_notes: p?.availability_notes || '',
  current_load: Number.isFinite(p?.current_load) ? p.current_load : 0,
  schedule: {
    available_hours_per_week: p?.schedule?.available_hours_per_week ?? 40,
    sprint_hours_remaining: p?.schedule?.sprint_hours_remaining ?? 20,
    work_days: Array.isArray(p?.schedule?.work_days)
      ? p.schedule.work_days
      : ['monday','tuesday','wednesday','thursday','friday'],
  },
});

const normalizeScanMeta = item => ({
  id: item?.id,
  label: item?.label || 'Scan result',
  timestamp: item?.created_at || '',
  systemName: item?.system_name || 'system',
  counts: item?.counts || {},
});

// ─── Pipeline Steps (9) ─────────────────────────────────────────────────────
const STEPS = [
  {key:'input_parse',    label:'Input Parsing',         icon:'📄',desc:'SBOM + VA report parsing'},
  {key:'cve_discovery',  label:'CVE Discovery',         icon:'🔍',desc:'OSV/NVD verification → bounded LLM fallback'},
  {key:'deep_research',  label:'Deep CVE Research',     icon:'🧬',desc:'NVD history + LLM Deep Intelligence Gathering (POCme)'},
  {key:'exploit_gen',    label:'Exploit Generation',    icon:'💣',desc:'LLM PoC synthesis — Senior Vulnerability Researcher (POCme)'},
  {key:'evaluation',     label:'Exploit Evaluation',    icon:'⚖️',desc:'Claude/Gemini viability, risk & remediation analysis'},
  {key:'blast_radius',   label:'Blast Radius Mapping',  icon:'🌐',desc:'LLM enterprise impact & PoC status analysis'},
  {key:'ai_scoring',     label:'Priority Scoring',      icon:'⚡',desc:'CVSS × PoC × Blast ÷ Complexity'},
  {key:'rationale',      label:'Rationale Generation',  icon:'🧠',desc:'LLM auditable natural-language rationale per CVE'},
  {key:'schedule_assign',label:'Schedule Assignment',   icon:'📅',desc:'Sprint capacity + completion date'},
];

// ─── Icon components ─────────────────────────────────────────────────────────
const Play = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
const Plus = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const X    = () => <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const Chev = ({open}) => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{transform:open?'rotate(90deg)':'none',transition:'transform .2s'}}><polyline points="9 18 15 12 9 6"/></svg>;
const Term = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>;
const Key  = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="15" r="5"/><line x1="17.657" y1="6.343" x2="12.929" y2="11.071"/><line x1="17.657" y1="6.343" x2="21" y2="9.686"/><line x1="22" y1="6" x2="20" y2="8"/></svg>;
const Copy = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;

// ─── Exploit code block with highlight.js ────────────────────────────────────
function CodeBlock({code, language}) {
  const ref = useRef(null);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    if (ref.current && window.hljs) {
      ref.current.removeAttribute('data-highlighted');
      window.hljs.highlightElement(ref.current);
    }
  }, [code]);

  const handleCopy = () => {
    navigator.clipboard.writeText(code||'').then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div className="exploit-code-wrap">
      <button className="copy-btn" onClick={handleCopy}><Copy/> {copied?'Copied!':'Copy'}</button>
      <pre><code ref={ref} className={`language-${language||'python'}`}>{code||'# No code generated'}</code></pre>
    </div>
  );
}

// ─── Configure Page ──────────────────────────────────────────────────────────
function ConfigurePage({onRun, exploitLang, setExploitLang, onGoTeamPage}) {
  const [packages,   setPackages]   = useState({});
  const [fileName,   setFileName]   = useState('');
  const [vaCves,     setVaCves]     = useState([]);
  const [vaLlmNote,  setVaLlmNote]  = useState('');
  const [vaFile,     setVaFile]     = useState('');
  const [vaUploading,setVaUploading]= useState(false);
  const [vaDragging, setVaDragging] = useState(false);
  const [dragging,   setDragging]   = useState(false);
  const [sysInfo, setSysInfo] = useState(() => ({name:'payment-gateway',tier:'critical',regulatory:['PCI'],owner:'security-team',dependencies:[]}));
  const [windows, setWindows] = useState(() => [{day:'Sunday',time:'02:00',duration_hours:4}]);
  const [team, setTeam] = useState(() => [
    {name:'Alex Chen',   email:'alex@co.com',  expertise:['nodejs','security'], current_load:0, schedule:{available_hours_per_week:40,sprint_hours_remaining:20,work_days:['monday','tuesday','wednesday','thursday','friday']}},
    {name:'Priya Sharma',email:'priya@co.com', expertise:['python','devops'],   current_load:0, schedule:{available_hours_per_week:40,sprint_hours_remaining:15,work_days:['monday','tuesday','wednesday','thursday','friday']}},
    {name:'Marcus Webb', email:'marcus@co.com',expertise:['nodejs','react'],    current_load:0, schedule:{available_hours_per_week:40,sprint_hours_remaining:24,work_days:['monday','tuesday','wednesday','thursday','friday']}},
  ]);
  const [newMember, setNewMember] = useState({name:'',email:'',expertiseStr:'',sprintHours:20});
  const [apiKeys,  setApiKeys]   = useState({anthropic:'',gemini:''});
  const [nlText, setNlText] = useState('');
  const [vendorAdvisoriesText, setVendorAdvisoriesText] = useState('[]');
  const [vendorLinesText, setVendorLinesText] = useState('');
  const [internalDocsText, setInternalDocsText] = useState('[]');
  const [internalLinesText, setInternalLinesText] = useState('');
  const [dependencyGraphText, setDependencyGraphText] = useState('[]');
  const [graphLinesText, setGraphLinesText] = useState('');
  const [connectorMsg, setConnectorMsg] = useState('');
  const [nlBusy, setNlBusy] = useState(false);
  const [nlMsg, setNlMsg] = useState('');
  const [teamSyncNote, setTeamSyncNote] = useState('');
  const [envKeys,  setEnvKeys]   = useState({gemini:false,anthropic:false,nvd:false});
  const [showApiModal, setShowApiModal] = useState(false);

  const normalizeSystemInfo = raw => ({
    name: raw?.name || 'payment-gateway',
    tier: raw?.tier || 'critical',
    regulatory: Array.isArray(raw?.regulatory) ? raw.regulatory : [],
    owner: raw?.owner || 'security-team',
    dependencies: Array.isArray(raw?.dependencies) ? raw.dependencies : [],
  });

  const normalizeTeamMember = m => ({
    name: m?.name || 'Engineer',
    email: m?.email || '',
    role: m?.role || '',
    linkedin_url: m?.linkedin_url || '',
    professional_summary: m?.professional_summary || '',
    expertise: Array.isArray(m?.expertise) ? m.expertise : [],
    availability_notes: m?.availability_notes || '',
    current_load: m?.current_load || 0,
    schedule: {
      available_hours_per_week: m?.schedule?.available_hours_per_week || 40,
      sprint_hours_remaining: m?.schedule?.sprint_hours_remaining || 20,
      work_days: Array.isArray(m?.schedule?.work_days) ? m.schedule.work_days : ['monday','tuesday','wednesday','thursday','friday'],
    },
  });

  const edgesToLines = edges => {
    if (!Array.isArray(edges)) return '';
    return edges
      .map(e => `${e?.source || ''} -> ${e?.target || ''}`)
      .filter(line => !line.startsWith(' ->'))
      .join('\n');
  };

  const parseGraphLines = raw => {
    const lines = (raw || '').split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const out = [];
    for (const line of lines) {
      const chain = line.split(/\s*->\s*/).map(s => s.trim()).filter(Boolean);
      if (chain.length < 2) continue;
      for (let i = 0; i < chain.length - 1; i += 1) {
        out.push({source: chain[i], target: chain[i + 1], relation: 'depends_on'});
      }
    }
    const uniq = [];
    const seen = new Set();
    for (const e of out) {
      const k = `${(e.source || '').toLowerCase()}|${(e.target || '').toLowerCase()}|${(e.relation || '').toLowerCase()}`;
      if (seen.has(k)) continue;
      seen.add(k);
      uniq.push(e);
    }
    return uniq;
  };

  const advisoriesToLines = advisories => {
    if (!Array.isArray(advisories)) return '';
    return advisories.map(a => [
      a?.advisory_id || '',
      a?.severity || 'medium',
      Array.isArray(a?.cve_ids) ? a.cve_ids.join(',') : '',
      Array.isArray(a?.affected_packages) ? a.affected_packages.join(',') : '',
      a?.title || '',
    ].join(' | ')).join('\n');
  };

  const parseAdvisoryLines = raw => {
    const lines = (raw || '').split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const advisories = [];
    for (const line of lines) {
      const [advisoryId, severity, cvesRaw, pkgsRaw, title] = line.split('|').map(s => s.trim());
      advisories.push({
        advisory_id: advisoryId || `ADV-${advisories.length + 1}`,
        title: title || advisoryId || 'Vendor advisory',
        severity: (severity || 'medium').toLowerCase(),
        cve_ids: (cvesRaw || '').split(',').map(s => s.trim()).filter(Boolean),
        affected_packages: (pkgsRaw || '').split(',').map(s => s.trim()).filter(Boolean),
        summary: '',
        url: '',
        published: '',
      });
    }
    return advisories;
  };

  const docsToLines = docs => {
    if (!Array.isArray(docs)) return '';
    return docs.map(d => [
      d?.doc_id || '',
      d?.title || '',
      Array.isArray(d?.systems) ? d.systems.join(',') : '',
      Array.isArray(d?.tags) ? d.tags.join(',') : '',
      d?.content || '',
    ].join(' | ')).join('\n');
  };

  const parseDocLines = raw => {
    const lines = (raw || '').split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const docs = [];
    for (const line of lines) {
      const [docId, title, systemsRaw, tagsRaw, content] = line.split('|').map(s => s.trim());
      docs.push({
        doc_id: docId || `DOC-${docs.length + 1}`,
        title: title || docId || 'Internal note',
        systems: (systemsRaw || '').split(',').map(s => s.trim()).filter(Boolean),
        tags: (tagsRaw || '').split(',').map(s => s.trim()).filter(Boolean),
        criticality: '',
        content: content || '',
      });
    }
    return docs;
  };

  const regulatoryList = Array.isArray(sysInfo?.regulatory) ? sysInfo.regulatory : [];
  useEffect(()=>{
    fetch(`${API_URL}/api/env-status`).then(r=>r.json()).then(d=>{
      setEnvKeys({gemini:!!d.gemini_key_loaded, anthropic:!!d.anthropic_key_loaded, nvd:!!d.nvd_key_loaded});
    }).catch(()=>{});
    // Load config from DB on mount
    fetch(`${API_URL}/api/config/load`).then(r=>r.ok?r.json():null).then(cfg=>{
      if (cfg) {
        if (cfg.packages && Object.keys(cfg.packages).length > 0) setPackages(cfg.packages);
        if (cfg.va_cve_ids && cfg.va_cve_ids.length > 0) setVaCves(cfg.va_cve_ids);
        if (cfg.system_info) setSysInfo(normalizeSystemInfo(cfg.system_info));
        if (cfg.maintenance_windows && cfg.maintenance_windows.length > 0) setWindows(cfg.maintenance_windows);
        if (cfg.team_members && cfg.team_members.length > 0) {
          setTeam(cfg.team_members.map(normalizeTeamMember));
        }
        if (cfg.api_keys) setApiKeys(cfg.api_keys);
        if (cfg.nl_text) setNlText(cfg.nl_text);
        if (Array.isArray(cfg.vendor_advisories)) {
          setVendorAdvisoriesText(JSON.stringify(cfg.vendor_advisories, null, 2));
          setVendorLinesText(advisoriesToLines(cfg.vendor_advisories));
        }
        if (Array.isArray(cfg.internal_docs)) {
          setInternalDocsText(JSON.stringify(cfg.internal_docs, null, 2));
          setInternalLinesText(docsToLines(cfg.internal_docs));
        }
        if (Array.isArray(cfg.dependency_graph)) {
          setDependencyGraphText(JSON.stringify(cfg.dependency_graph, null, 2));
          setGraphLinesText(edgesToLines(cfg.dependency_graph));
        }
      }
    }).catch(()=>{});
    // Auto-load team profiles from DB on mount
    fetch(`${API_URL}/api/team-profiles`).then(r=>r.ok?r.json():{items:[]}).then(d=>{
      if (Array.isArray(d.items) && d.items.length > 0) {
        const imported = d.items.map(teamProfileToMember);
        setTeam(imported);
        setTeamSyncNote(`Auto-loaded ${imported.length} team profile(s) from database.`);
      }
    }).catch(()=>{});
  }, []);
  const fileRef = useRef(null);
  const vaRef   = useRef(null);
  const sampleRef = useRef(null);

  const parsePackageJson = txt => {
    try {
      const j = JSON.parse(txt);
      const deps = {...(j.dependencies||{}), ...(j.devDependencies||{})};
      const out = {};
      for (const [k,v] of Object.entries(deps).slice(0,30))
        out[k] = v.replace(/[\^~>=<]/g,'').trim();
      return out;
    } catch { return {}; }
  };

  const handleFile = f => {
    if (!f) return;
    setFileName(f.name);
    const r = new FileReader();
    r.onload = e => setPackages(parsePackageJson(e.target.result));
    r.readAsText(f);
  };

  const handleVaFile = async f => {
    if (!f) return;
    setVaFile(f.name);
    setVaUploading(true);
    try {
      const fd = new FormData();
      fd.append('file', f);
      const resp = await fetch(`${API_URL}/api/upload-report`, {method:'POST', body:fd});
      const data = await resp.json();
      setVaCves(data.cve_ids || []);
      if (data.llm_mapped) setVaLlmNote(`🤖 LLM mapped ${data.count} CVEs from report findings (no standard CVE IDs found)`);
      else if (data.count > 0) setVaLlmNote(`✓ ${data.count} CVE IDs extracted directly from document`);
      else setVaLlmNote('⚠ No CVEs found — add packages in SBOM or use LLM discovery');
    } catch {
      // Fallback: parse as text client-side
      const r = new FileReader();
      r.onload = e => {
        const found = (e.target.result.match(/CVE-\d{4}-\d{4,7}/gi)||[]).filter((v,i,a)=>a.indexOf(v)===i);
        setVaCves(found.map(c=>c.toUpperCase()));
        setVaLlmNote(found.length > 0 ? `✓ ${found.length} CVEs found (client-side parse)` : '⚠ No CVEs found in text');
      };
      r.readAsText(f);
    }
    setVaUploading(false);
  };

  const fetchSampleBundle = async () => {
    if (sampleRef.current) return sampleRef.current;
    const resp = await fetch(`${API_URL}/api/sample-input`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const data = await resp.json();
    sampleRef.current = data;
    return data;
  };

  const applySampleSystem = data => {
    if (data.system_info) setSysInfo(normalizeSystemInfo(data.system_info));
    if (Array.isArray(data.team_members) && data.team_members.length) setTeam(data.team_members.map(normalizeTeamMember));
    if (Array.isArray(data.maintenance_windows) && data.maintenance_windows.length) setWindows(data.maintenance_windows);
  };

  const loadSample = async () => {
    try {
      const data = await fetchSampleBundle();
      setPackages(data.packages || {});
      setFileName(`${data.package_filename || 'sample_package.json'} (${data.package_count || Object.keys(data.packages||{}).length} packages)`);
      applySampleSystem(data);
    } catch (e) {
      setVaLlmNote(`⚠ Unable to load demo sample data: ${e.message}`);
    }
  };

  const loadSampleVa = async () => {
    try {
      const data = await fetchSampleBundle();
      setVaCves(data.va_cve_ids || []);
      setVaFile(`${data.va_filename || 'va_report_sample.txt'} (${data.va_count || (data.va_cve_ids||[]).length} matched CVEs)`);
      if ((data.unmatched_va_count||0) > 0) {
        setVaLlmNote(`✓ Loaded ${data.va_count} SBOM-matched CVEs from sample VA report; omitted ${data.unmatched_va_count} unrelated findings`);
      } else {
        setVaLlmNote(`✓ Loaded ${data.va_count || (data.va_cve_ids||[]).length} SBOM-matched CVEs from sample VA report`);
      }
    } catch (e) {
      setVaLlmNote(`⚠ Unable to load demo VA report: ${e.message}`);
    }
  };

  const toggleReg = r => setSysInfo(s=>{
    const regs = Array.isArray(s.regulatory) ? s.regulatory : [];
    return {...s,regulatory:regs.includes(r)?regs.filter(x=>x!==r):[...regs,r]};
  });

  const addMember = () => {
    const {name,email,expertiseStr,sprintHours} = newMember;
    if (!name||!email) return;
    setTeam(t=>[...t,{name,email,expertise:expertiseStr.split(',').map(s=>s.trim()).filter(Boolean),current_load:0,schedule:{available_hours_per_week:40,sprint_hours_remaining:parseInt(sprintHours)||20,work_days:['monday','tuesday','wednesday','thursday','friday']}}]);
    setNewMember({name:'',email:'',expertiseStr:'',sprintHours:20});
  };
  const removeMember = i => setTeam(t=>t.filter((_,j)=>j!==i));
  const updateSprintHours = (i,h) => setTeam(t=>t.map((m,j)=>j===i?{...m,schedule:{...m.schedule,sprint_hours_remaining:parseInt(h)||0}}:m));

  const importTeamProfiles = async () => {
    try {
      const resp = await fetch(`${API_URL}/api/team-profiles`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const imported = (Array.isArray(data.items) ? data.items : []).map(teamProfileToMember);
      if (!imported.length) {
        setTeamSyncNote('No saved team profiles found in database.');
        return;
      }
      setTeam(imported);
      setTeamSyncNote(`Imported ${imported.length} team profiles from database.`);
    } catch (err) {
      setTeamSyncNote(`Unable to import team profiles: ${err.message}`);
    }
  };

  const parseConnectorJson = (raw, label) => {
    const txt = (raw || '').trim();
    if (!txt) return [];
    let parsed = null;
    try {
      parsed = JSON.parse(txt);
    } catch {
      throw new Error(`${label} must be valid JSON array`);
    }
    if (!Array.isArray(parsed)) throw new Error(`${label} must be a JSON array`);
    return parsed;
  };

  const parseConnectorJsonNoThrow = raw => {
    try {
      const parsed = JSON.parse((raw || '').trim() || '[]');
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  };

  const buildGraphFromLines = () => {
    const edges = parseGraphLines(graphLinesText);
    setDependencyGraphText(JSON.stringify(edges, null, 2));
    setConnectorMsg(edges.length ? `Built ${edges.length} dependency edge(s) from simple input.` : 'No valid graph lines found. Use format: source -> target');
  };

  const buildAdvisoriesFromLines = () => {
    const advisories = parseAdvisoryLines(vendorLinesText);
    setVendorAdvisoriesText(JSON.stringify(advisories, null, 2));
    setConnectorMsg(advisories.length ? `Built ${advisories.length} vendor advisory record(s) from simple input.` : 'No valid advisory lines found.');
  };

  const buildDocsFromLines = () => {
    const docs = parseDocLines(internalLinesText);
    setInternalDocsText(JSON.stringify(docs, null, 2));
    setConnectorMsg(docs.length ? `Built ${docs.length} internal doc record(s) from simple input.` : 'No valid internal-doc lines found.');
  };

  const syncDependenciesFromGraph = () => {
    const edges = parseConnectorJsonNoThrow(dependencyGraphText);
    const deps = Array.from(new Set(edges.map(e => (e?.target || '').trim()).filter(Boolean)));
    setSysInfo(s => ({...s, dependencies: deps}));
    setConnectorMsg(deps.length ? `Synced ${deps.length} downstream dependencies from graph.` : 'No dependency targets found to sync.');
  };

  useEffect(() => {
    // Auto-save config to DB (debounced: only save changes, not on every keystroke)
    const saveTimer = setTimeout(() => {
      fetch(`${API_URL}/api/config/save`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          packages,
          va_cve_ids: vaCves,
          system_info: sysInfo,
          maintenance_windows: windows,
          team_members: team,
          vendor_advisories: parseConnectorJsonNoThrow(vendorAdvisoriesText),
          internal_docs: parseConnectorJsonNoThrow(internalDocsText),
          dependency_graph: parseConnectorJsonNoThrow(dependencyGraphText),
          exploit_language: exploitLang,
          api_keys: apiKeys,
          nl_text: nlText,
        }),
      }).catch(()=>{});
    }, 1000);
    return () => clearTimeout(saveTimer);
  }, [packages, vaCves, sysInfo, windows, team, exploitLang, apiKeys, nlText, vendorAdvisoriesText, internalDocsText, dependencyGraphText]);

  const hasApiKey = !!(apiKeys.anthropic || apiKeys.gemini || envKeys.gemini || envKeys.anthropic);
  const canRun = Object.keys(packages).length > 0 || vaCves.length > 0;

  const handleRun = () => {
    let vendorAdvisories = [];
    let internalDocs = [];
    let dependencyGraph = [];
    try {
      vendorAdvisories = parseConnectorJson(vendorAdvisoriesText, 'Vendor advisories');
      internalDocs = parseConnectorJson(internalDocsText, 'Internal docs');
      dependencyGraph = parseConnectorJson(dependencyGraphText, 'Dependency graph');
      setConnectorMsg('');
    } catch (err) {
      setConnectorMsg(err.message);
      return;
    }
    onRun({packages, va_cve_ids:vaCves, system_info:sysInfo, maintenance_windows:windows,
           team_members:team, vendor_advisories:vendorAdvisories, internal_docs:internalDocs, dependency_graph:dependencyGraph,
           exploit_language:exploitLang,
           anthropic_api_key:apiKeys.anthropic||null, gemini_api_key:apiKeys.gemini||null});
  };

  const applyNaturalLanguageConfig = async () => {
    if (!nlText.trim()) {
      setNlMsg('Type a short description first, for example: "Critical payment system, PCI + SOX, patch Sunday 1am for 3 hours".');
      return;
    }
    setNlBusy(true);
    setNlMsg('');
    try {
      const resp = await fetch(`${API_URL}/api/parse-config-nl`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          text: nlText,
          current_system_info: sysInfo,
          current_maintenance_windows: windows,
          anthropic_api_key: apiKeys.anthropic || null,
          gemini_api_key: apiKeys.gemini || null,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
      if (data.system_info) setSysInfo(normalizeSystemInfo(data.system_info));
      if (Array.isArray(data.maintenance_windows) && data.maintenance_windows.length) setWindows(data.maintenance_windows);
      setNlMsg(data.assistant_message || 'Configuration updated from natural-language input.');
    } catch (err) {
      setNlMsg(`Unable to parse natural-language config: ${err.message}`);
    }
    setNlBusy(false);
  };

  return (
    <div className="page">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:26,flexWrap:'wrap',gap:12}}>
        <div>
          <div className="page-title">Configure Analysis</div>
          <div className="page-sub">Upload SBOM + VA report, define your system, set team schedule</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
          {!hasApiKey&&<div style={{background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.3)',borderRadius:8,padding:'6px 12px',fontSize:12,color:'#fcd34d',display:'flex',alignItems:'center',gap:6}}>
            ⚠ No Gemini or Anthropic key loaded — verified-data mode will still run NVD/OSV lookups and deterministic fallbacks
          </div>}
          {(envKeys.gemini||envKeys.anthropic)&&<div style={{background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.3)',borderRadius:8,padding:'6px 12px',fontSize:12,color:'#6ee7b7',display:'flex',alignItems:'center',gap:6}}>
            ✓ Server .env: {envKeys.gemini&&'Gemini'}{envKeys.gemini&&envKeys.anthropic&&' + '}{envKeys.anthropic&&'Anthropic'} key loaded{envKeys.nvd&&' + NVD'}
          </div>}
          {!envKeys.nvd&&(envKeys.gemini||envKeys.anthropic)&&<div style={{background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.3)',borderRadius:8,padding:'6px 12px',fontSize:12,color:'#fcd34d',display:'flex',alignItems:'center',gap:6}}>
            ⚠ No NVD_API_KEY — CVSS fetch limited to 5 req/30s. Add key to .env to prevent NVD PENDING on multi-CVE scans.
          </div>}
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-outline btn-sm" onClick={()=>setShowApiModal(true)}><Key/> {(envKeys.gemini||envKeys.anthropic)?'✓ .env Keys Active':'API Keys Optional'}</button>
            <button className="btn btn-primary" disabled={!canRun} onClick={handleRun} title={!hasApiKey?'Runs in verified-data mode without Gemini/Anthropic; add a key for LLM research and PoCs.':undefined}><Play/> Run Agentic Analysis</button>
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom:18}}>
        <div className="card-header"><span>💬</span><span className="card-title">Config Chat</span></div>
        <div className="card-body" style={{display:'grid',gap:10}}>
          <div className="section-label">Describe system, regulations, and maintenance in plain English</div>
          <textarea
            value={nlText}
            onChange={e=>setNlText(e.target.value)}
            placeholder="Example: Payment API for checkout, owner platform-security, critical tier, PCI + GDPR, depends on stripe and redis, patch on Sunday at 01:00 for 3 hours"
            style={{minHeight:90,resize:'vertical',background:'#0b1224',color:'#e5e7eb',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}
          />
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-sm" onClick={applyNaturalLanguageConfig} disabled={nlBusy}>{nlBusy?'Parsing...':'Apply from Chat'}</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setNlText('')}>Clear</button>
          </div>
          {nlMsg&&<div style={{fontSize:12,color:'var(--text2)'}}>{nlMsg}</div>}
        </div>
      </div>

      <div className="card" style={{marginBottom:18}}>
        <div className="card-header"><span>🔌</span><span className="card-title">Connector Inputs (Phase 2)</span></div>
        <div className="card-body" style={{display:'grid',gap:10}}>
          <div className="section-label">Vendor advisories JSON array</div>
          <textarea
            value={vendorAdvisoriesText}
            onChange={e=>setVendorAdvisoriesText(e.target.value)}
            placeholder='[{"advisory_id":"ADV-2026-001","cve_ids":["CVE-2026-1234"],"affected_packages":["axios"],"severity":"high","title":"Vendor patch note"}]'
            style={{minHeight:90,resize:'vertical',background:'#0b1224',color:'#e5e7eb',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}
          />
          <div className="section-label">Simple advisories input (advisory_id | severity | cves | packages | title)</div>
          <textarea
            value={vendorLinesText}
            onChange={e=>setVendorLinesText(e.target.value)}
            placeholder={'ADV-2026-001 | high | CVE-2026-1234,CVE-2026-5678 | axios,express | Vendor patch note'}
            style={{minHeight:74,resize:'vertical',background:'#0b1224',color:'#e5e7eb',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}
          />
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="btn btn-outline btn-sm" onClick={buildAdvisoriesFromLines}>Build Advisory JSON</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setVendorLinesText('ADV-2026-001 | high | CVE-2026-1234 | axios | Axios security fix')}>Load Advisory Example</button>
          </div>
          <div className="section-label">Internal docs JSON array</div>
          <textarea
            value={internalDocsText}
            onChange={e=>setInternalDocsText(e.target.value)}
            placeholder='[{"doc_id":"DOC-SEC-01","title":"Payment Service Threat Notes","systems":["payment-api","reporting"],"tags":["pci"],"content":"axios path used in checkout flow"}]'
            style={{minHeight:90,resize:'vertical',background:'#0b1224',color:'#e5e7eb',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}
          />
          <div className="section-label">Simple internal-doc input (doc_id | title | systems | tags | content)</div>
          <textarea
            value={internalLinesText}
            onChange={e=>setInternalLinesText(e.target.value)}
            placeholder={'DOC-SEC-01 | Payment Threat Notes | payment-api,reporting | pci,checkout | axios used in checkout flow'}
            style={{minHeight:74,resize:'vertical',background:'#0b1224',color:'#e5e7eb',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}
          />
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="btn btn-outline btn-sm" onClick={buildDocsFromLines}>Build Internal Docs JSON</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setInternalLinesText('DOC-SEC-01 | Payment Threat Notes | payment-api,reporting | pci | axios used in checkout flow')}>Load Docs Example</button>
          </div>
          <div className="section-label">Dependency graph JSON array</div>
          <textarea
            value={dependencyGraphText}
            onChange={e=>setDependencyGraphText(e.target.value)}
            placeholder='[{"source":"axios","target":"payment-api","relation":"depends_on"},{"source":"payment-api","target":"reporting","relation":"calls"}]'
            style={{minHeight:90,resize:'vertical',background:'#0b1224',color:'#e5e7eb',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}
          />
          <div className="section-label">Simple graph input (one chain per line)</div>
          <textarea
            value={graphLinesText}
            onChange={e=>setGraphLinesText(e.target.value)}
            placeholder={'axios -> payment-api -> reporting\nexpress -> web-gateway -> auth-service'}
            style={{minHeight:80,resize:'vertical',background:'#0b1224',color:'#e5e7eb',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}
          />
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="btn btn-outline btn-sm" onClick={buildGraphFromLines}>Build JSON from Lines</button>
            <button className="btn btn-outline btn-sm" onClick={syncDependenciesFromGraph}>Sync Dependencies from Graph</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setGraphLinesText('axios -> payment-api -> reporting\njsonwebtoken -> auth-service')}>Load Example</button>
          </div>
          <div style={{fontSize:12,color:'var(--text2)'}}>These connector inputs are stored in DB and used to enrich CVE matching and dependency impact.</div>
          {connectorMsg&&<div style={{fontSize:12,color:'#fca5a5'}}>{connectorMsg}</div>}
        </div>
      </div>

      <div className="config-grid">
        {/* LEFT */}
        <div style={{display:'flex',flexDirection:'column',gap:18}}>

          {/* SBOM */}
          <div className="card">
            <div className="card-header"><span>📦</span><span className="card-title">SBOM / Package Input</span></div>
            <div className="card-body">
              <div className="section-label">Upload package.json or SBOM</div>
              <div className={`drop-zone${dragging?' drag-over':''}`}
                onDragOver={e=>{e.preventDefault();setDragging(true)}}
                onDragLeave={()=>setDragging(false)}
                onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0])}}
                onClick={()=>fileRef.current.click()}>
                <div className="drop-zone-icon">📂</div>
                <div className="drop-zone-title">{fileName||'Drop package.json / SBOM here'}</div>
                <div className="drop-zone-sub">{fileName?`${Object.keys(packages).length} packages loaded`:'or click to browse'}</div>
                <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
              </div>
              <div style={{textAlign:'center',margin:'10px 0',color:'var(--text3)',fontSize:11}}>— or —</div>
              <button className="btn btn-outline" style={{width:'100%'}} onClick={loadSample}>⚡ Load Demo SBOM</button>
              {Object.keys(packages).length>0 && (
                <div style={{marginTop:12}}>
                  <div className="section-label">Packages ({Object.keys(packages).length})</div>
                  <div className="packages-preview">{Object.entries(packages).map(([k,v])=><div key={k} className="pkg-row"><span className="pkg-name">{k}</span><span className="pkg-ver">{v}</span></div>)}</div>
                </div>
              )}
            </div>
          </div>

          {/* VA Report */}
          <div className="card">
            <div className="card-header"><span>📋</span><span className="card-title">Vulnerability Assessment Report</span><span style={{fontSize:11,color:'#a78bfa',marginLeft:'auto'}}>optional</span></div>
            <div className="card-body">
              <div className="section-label">Upload VA/Pentest Report — CVE IDs extracted automatically</div>
              <div className={`va-drop-zone${vaDragging?' drag-over':''}`}
                onDragOver={e=>{e.preventDefault();setVaDragging(true)}}
                onDragLeave={()=>setVaDragging(false)}
                onDrop={e=>{e.preventDefault();setVaDragging(false);handleVaFile(e.dataTransfer.files[0])}}
                onClick={()=>vaRef.current.click()}>
                {vaUploading ? (
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                    <div className="spinner" style={{width:24,height:24}}/>
                    <div style={{fontSize:12,color:'var(--text2)'}}>Extracting CVE IDs…</div>
                  </div>
                ) : (
                  <>
                    <div style={{fontSize:28,marginBottom:8}}>📄</div>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text0)',marginBottom:3}}>{vaFile||'Drop VA Report here (PDF or .txt)'}</div>
                    <div style={{fontSize:11,color:'var(--text2)'}}>{vaFile?`${vaCves.length} CVE IDs extracted`:'CVE IDs parsed automatically — supports VA-01/VULN-1 style via LLM'}</div>
                  </>
                )}
                <input ref={vaRef} type="file" accept=".pdf,.txt,.csv,.html,.xml" style={{display:'none'}} onChange={e=>handleVaFile(e.target.files[0])}/>
              </div>
              {vaLlmNote&&<div style={{marginTop:8,padding:'6px 10px',borderRadius:6,fontSize:11,background:vaLlmNote.startsWith('🤖')?'rgba(124,58,237,.12)':vaLlmNote.startsWith('⚠')?'rgba(245,158,11,.1)':'rgba(16,185,129,.1)',color:vaLlmNote.startsWith('🤖')?'#a78bfa':vaLlmNote.startsWith('⚠')?'#fbbf24':'#6ee7b7',border:`1px solid ${vaLlmNote.startsWith('🤖')?'rgba(124,58,237,.3)':vaLlmNote.startsWith('⚠')?'rgba(245,158,11,.25)':'rgba(16,185,129,.25)'}`}}>{vaLlmNote}</div>}
              <div style={{textAlign:'center',margin:'10px 0',color:'var(--text3)',fontSize:11}}>— or —</div>
              <button className="btn btn-purple btn-sm" style={{width:'100%'}} onClick={loadSampleVa}>📋 Load Demo VA Report</button>
              {vaCves.length>0 && (
                <div style={{marginTop:12}}>
                  <div className="section-label">Extracted CVE IDs ({vaCves.length})</div>

// ─── Pipeline Page ────────────────────────────────────────────────────────────
function PipelinePage({stepStates, logs, progress}) {
  const logRef = useRef(null);
  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; },[logs]);

  return (
    <div className="page">
      <div style={{marginBottom:20}}>
        <div className="page-title">🤖 Agentic Pipeline Running</div>
        <div className="page-sub">9-step verified + AI-assisted pipeline — grounded CVE discovery · bounded research · LLM evaluation</div>
      </div>
      <div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:`${progress}%`}}/></div>
      <div className="pipeline-container">
        <div className="card" style={{padding:'6px 0'}}>
          <div className="step-list">
            {STEPS.map((s,idx)=>{
              const st = stepStates[s.key]||'pending';
              return (
                <div key={s.key} className={`step-item${st==='running'?' active':''}${st==='done'?' done':''}`} style={{position:'relative'}}>
                  {idx<STEPS.length-1 && <div className={`step-connector${st==='done'?' done':''}`}/>}
                  <div className={`step-icon-wrap ${st}`}>{st==='done'?'✓':st==='running'?<div className="spinner"/>:s.icon}</div>
                  <div className="step-info">
                    <div className="step-name">
                      {s.label}
                      <span className={`step-badge ${st}`}>{st==='running'?'ACTIVE':st==='done'?'DONE':st==='error'?'ERR':'WAIT'}</span>
                    </div>
                    <div className="step-msg">{stepStates[s.key+'_msg']||s.desc}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="log-panel">
          <div className="log-header"><Term/> Live Agent Log <span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{logs.length} events</span></div>
          <div className="log-body" ref={logRef}>
            {logs.length===0 && <div style={{color:'var(--text3)'}}>Waiting for agent…</div>}
            {logs.map((l,i)=><div key={i} className="log-line"><span className="log-time">{l.time}</span><span className={`log-text ${l.type||''}`}>{l.text}</span></div>)}
          </div>
        </div>
      </div>
    </div>
  );
}

function VulnerabilitiesTab({vulns, execSummary, riskReduction}) {

  const safeVulns = Array.isArray(vulns) ? vulns.filter(Boolean) : [];
  const filtered = safeVulns.filter(v=>filterPoC?v.has_poc:true);

  return (
    <div>
      <div className="exec-box">
        <div className="exec-label">🤖 AI Executive Summary</div>
        <div className="exec-text">{execSummary}</div>
      </div>
      <div className="card" style={{marginBottom:22}}>
        <div className="card-header"><span>📊</span><span className="card-title">Risk Reduction</span></div>

          <div className="risk-delta-wrap">

              <div style={{fontSize:11,color:'var(--text2)',marginBottom:5}}>Before patching</div>

              <div style={{fontSize:11,color:'var(--text2)',margin:'10px 0 5px'}}>After patching top 3</div>
              <div className="risk-bar-bg"><div className="risk-bar-fill risk-after" style={{width:`${100-riskReduction}%`}}>{100-riskReduction}%</div></div>
            </div>
            <div style={{textAlign:'center',flexShrink:0}}>
              <div style={{fontSize:44,fontWeight:800,fontFamily:'var(--mono)',color:'var(--success)',lineHeight:1}}>↓{riskReduction}%</div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>risk reduction</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--text0)',flex:1}}>{filtered.length} Vulnerabilities — Ranked by Priority Score</div>
        <label className={`checkbox-item${filterPoC?' checked':''}`} style={{cursor:'pointer'}}>
          <input type="checkbox" checked={filterPoC} onChange={e=>setFilterPoC(e.target.checked)} style={{display:'none'}}/>

      <div className="card" style={{overflow:'auto'}}>
        <table className="vuln-table">

          <tbody>
            {filtered.map((v,i)=>(
              <React.Fragment key={v.cve_id}>
                <tr className={`vuln-row${expanded===i?' expanded':''}`} onClick={()=>setExpanded(expanded===i?null:i)}>
                  <td><div className={`rank-badge${v.rank===1?' rank1':v.rank<=3?' top3':''}`}>#{v.rank}</div></td>
                  <td><span className="cve-id">{v.cve_id}</span></td>
                  <td><span className="pkg-chip">{v.package}@{v.version||'?'}</span></td>
                  <td><span className={`cvss-badge ${cvssClass(v.cvss,v.nvd_score_pending)}`}>{v.nvd_score_pending?'—':v.cvss} {cvssLabel(v.cvss,v.nvd_score_pending,v.cvss_source)}</span></td>
                  <td><span className={`poc-badge ${v.has_poc?'poc-yes':'poc-no'}`}>{v.has_poc?'⚡ ACTIVE':'None'}</span></td>
                  <td><span className={`viability-badge ${vClass(v.evaluation?.viability||'Medium')}`}>{v.evaluation?.viability||'—'}</span></td>
                  <td><span className="blast-num">×{v.blast_radius}</span></td>
                  <td><span className={`score-pill ${scoreClass(v.priority_score)}`}>{v.priority_score}</span></td>
                  <td>{v.assigned_to&&<div style={{display:'flex',alignItems:'center',gap:6}}><div className="avatar" style={{background:avatarClr(v.assigned_to)}}>{initials(v.assigned_to)}</div><span style={{fontSize:11}}>{v.assigned_to.split(' ')[0]}</span></div>}</td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{v.completion_date||'—'}</span></td>
                  <td><span className={`source-badge ${sourceBadge(v.source||'demo')}`}>{sourceLabel(v.source||'demo')}</span></td>

                        </>}

                      <div>
                        <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#a78bfa',marginBottom:8}}>Blast Radius ({v.blast_radius})</div>

                            <div key={l} style={{background:'var(--bg2)',borderRadius:6,padding:'7px 10px',border:'1px solid var(--border2)'}}>
                              <div style={{fontSize:9,letterSpacing:1,textTransform:'uppercase',color:'var(--text3)',marginBottom:2}}>{l}</div>
                              <div style={{fontSize:11,fontFamily:'var(--mono)',fontWeight:600,color:'var(--text0)'}}>{val}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </td></tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

                onClick={()=>handleGeneratePoC(v, pocState?.[v.cve_id]?.language||exploitLang)}>
                {pocState?.[v.cve_id]?.loading ? '⟳ Generating...' : '💣 Generate PoC'}
              </button>
              {pocState?.[v.cve_id]?.error && (
                <div style={{color:'var(--danger)',fontSize:12,marginTop:8}}>{pocState[v.cve_id].error}</div>
              )}
              <div className="poc-warning">⚠ For authorized patch verification only. Use in isolated environment.</div>
            </div>
          ) : (
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>
                  {pocState[v.cve_id]?.model ? `✦ ${pocState[v.cve_id].model}` : '✦ Generated'}
                </span>
                <button className="btn btn-sm btn-outline" style={{fontSize:10,padding:'2px 8px'}}
                  onClick={()=>setPocState(p=>({...p,[v.cve_id]:{...p[v.cve_id],code:''}}))}>
                  ↺ Regenerate
                </button>
              </div>
              <CodeBlock code={pocState[v.cve_id].code} language={pocState[v.cve_id].language||'python'}/>
            </div>
          )}

          <div className="exploit-eval">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text1)',flex:1,background:'var(--bg3)',padding:'8px 12px',borderRadius:8,border:'1px solid var(--border2)'}}>
                <strong style={{color:'var(--warning)'}}>Risk:</strong> {v.evaluation?.risk_summary||'—'}
              </div>
              <div style={{flexShrink:0,textAlign:'center',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 14px'}}>
                <div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:800,color:v.evaluation?.viability==='High'?'var(--danger)':v.evaluation?.viability==='Low'?'var(--success)':'var(--warning)'}}>{v.evaluation?.viability||'?'}</div>
                <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1}}>VIABILITY</div>
                <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',marginTop:2}}>{Math.round((v.evaluation?.confidence||0)*100)}% conf</div>
              </div>
            </div>
            <div className="eval-grid">
              <div>
                <div className="eval-section-title">🔧 Remediation Steps</div>
                <div className="eval-steps">
                  {(v.evaluation?.remediation_steps||[]).map((s,i)=><div key={i} className="eval-step remediation">{s}</div>)}
                </div>
              </div>
              <div>
                <div className="eval-section-title">✅ Verification Steps (for Dev)</div>
                <div className="eval-steps">
                  {(v.evaluation?.verification_steps||[]).map((s,i)=><div key={i} className="eval-step verification">{s}</div>)}
                </div>
              </div>
            </div>
          </div>
        </div>
      ))}
      {filtered.length===0&&<div style={{textAlign:'center',padding:'60px 20px',color:'var(--text3)'}}>No exploits match the current filter.</div>}
    </div>
  );
}
