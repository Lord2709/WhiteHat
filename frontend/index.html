<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VulnPriority AI — Agentic Vulnerability Prioritization</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg0:#040912;--bg1:#080f1e;--bg2:#0c1428;--bg3:#111d35;--bg4:#162040;
    --primary:#00d4aa;--primary-dim:rgba(0,212,170,.12);--primary-glow:rgba(0,212,170,.35);
    --secondary:#7c3aed;--sec-dim:rgba(124,58,237,.15);
    --danger:#ff4757;--danger-dim:rgba(255,71,87,.12);
    --warning:#f59e0b;--warn-dim:rgba(245,158,11,.12);
    --success:#10b981;--succ-dim:rgba(16,185,129,.12);
    --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);
    --pink:#ec4899;--pink-dim:rgba(236,72,153,.12);
    --text0:#f0f6ff;--text1:#c8d8ed;--text2:#7a8fa6;--text3:#4a5e72;
    --border:rgba(0,212,170,.1);--border2:rgba(255,255,255,.06);
    --mono:'JetBrains Mono','Fira Code',monospace;--sans:'Inter',sans-serif;
    --radius:12px;--radius-sm:8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg0);color:var(--text1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg1)}
  ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
  .app-shell{display:flex;flex-direction:column;min-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:rgba(8,15,30,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-text{font-size:18px;font-weight:700;letter-spacing:-.4px;color:var(--text0)}
  .logo-text span{color:var(--primary)}
  .logo-badge{font-size:10px;font-family:var(--mono);background:var(--primary-dim);color:var(--primary);border:1px solid var(--border);border-radius:4px;padding:2px 7px;letter-spacing:.5px}
  .topbar-right{display:flex;align-items:center;gap:16px}
  .status-dot{width:8px;height:8px;border-radius:50%}
  .status-dot.green{background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse-dot 2s infinite}
  .status-dot.orange{background:var(--warning);box-shadow:0 0 8px var(--warning)}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
  .page-nav{display:flex;gap:4px}
  .nav-step{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .2s}
  .nav-step.active{background:var(--primary-dim);color:var(--primary)}
  .nav-step.done{color:var(--success)}
  .nav-num{width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);flex-shrink:0}
  .page{padding:32px 28px;max-width:1300px;margin:0 auto;width:100%;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
  .card-header{padding:14px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
  .card-title{font-size:14px;font-weight:600;color:var(--text0)}
  .card-body{padding:20px}
  .config-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:900px){.config-grid{grid-template-columns:1fr}}
  .section-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--primary);margin-bottom:10px}
  .drop-zone{border:2px dashed rgba(0,212,170,.25);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--primary-dim)}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);background:rgba(0,212,170,.18)}
  .drop-zone-icon{font-size:32px;margin-bottom:8px}
  .drop-zone-title{font-size:14px;font-weight:600;color:var(--text0);margin-bottom:3px}
  .drop-zone-sub{font-size:12px;color:var(--text2)}
  .va-drop-zone{border:2px dashed rgba(124,58,237,.3);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--sec-dim)}
  .va-drop-zone:hover,.va-drop-zone.drag-over{border-color:var(--secondary);background:rgba(124,58,237,.2)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;font-weight:500;color:var(--text2)}
  .field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text0);padding:9px 12px;font-size:13px;font-family:var(--sans);outline:none;transition:border-color .2s}
  .field input:focus,.field select:focus{border-color:var(--primary)}
  .field input::placeholder{color:var(--text3)}
  .field select option{background:var(--bg3)}
  .field-group{display:flex;flex-direction:column;gap:12px}
  .checkbox-group{display:flex;gap:8px;flex-wrap:wrap}
  .checkbox-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;user-select:none}
  .checkbox-item.checked{background:var(--sec-dim);border-color:var(--secondary);color:#a78bfa}
  .checkbox-item input{display:none}
  .team-member-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2);animation:slideIn .2s ease}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
  .member-name{font-size:13px;font-weight:600;color:var(--text0)}
  .member-skills{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
  .skill-tag{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:var(--blue-dim);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
  .sprint-input{width:70px;padding:4px 8px;font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--primary);text-align:center}
  .window-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2)}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--sans)}
  .btn-primary{background:var(--primary);color:#000}
  .btn-primary:hover{background:#00f0c5;transform:translateY(-1px);box-shadow:0 4px 20px var(--primary-glow)}
  .btn-primary:disabled{opacity:.4;transform:none;cursor:not-allowed}
  .btn-outline{background:transparent;color:var(--text1);border:1px solid var(--border2)}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn-ghost{background:transparent;color:var(--text2);padding:4px 8px;font-size:12px}
  .btn-ghost:hover{color:var(--danger)}
  .btn-purple{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
  .btn-purple:hover{background:rgba(124,58,237,.35)}
  .packages-preview{max-height:200px;overflow-y:auto;background:var(--bg0);border-radius:var(--radius-sm);padding:12px;font-family:var(--mono);font-size:11px;color:var(--text2)}
  .pkg-row{display:flex;justify-content:space-between;padding:2px 0}
  .pkg-name{color:var(--primary)}
  .pkg-ver{color:var(--text3)}
  .cve-pill{font-family:var(--mono);font-size:10px;padding:3px 8px;background:var(--sec-dim);color:#a78bfa;border:1px solid rgba(124,58,237,.25);border-radius:5px;cursor:default}

  /* ─── Pipeline ─── */
  .pipeline-container{display:grid;grid-template-columns:360px 1fr;gap:24px;max-width:1240px;margin:0 auto}
  @media(max-width:900px){.pipeline-container{grid-template-columns:1fr}}
  .step-list{display:flex;flex-direction:column;gap:0}
  .step-item{display:flex;gap:14px;padding:13px 18px;border-radius:0;transition:background .2s;position:relative}
  .step-item:first-child{border-radius:var(--radius) var(--radius) 0 0}
  .step-item:last-child{border-radius:0 0 var(--radius) var(--radius)}
  .step-item.active{background:var(--primary-dim)}
  .step-item.done{background:var(--succ-dim)}
  .step-connector{position:absolute;left:34px;top:50px;width:2px;background:var(--border2);height:calc(100% - 8px);z-index:0}
  .step-connector.done{background:var(--success)}
  .step-icon-wrap{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--border2);background:var(--bg2);position:relative;z-index:1;transition:all .3s}
  .step-icon-wrap.running{border-color:var(--primary);background:var(--primary-dim);animation:spin-ring 1s linear infinite}
  .step-icon-wrap.done{border-color:var(--success);background:var(--succ-dim)}
  .step-icon-wrap.error{border-color:var(--danger);background:var(--danger-dim)}
  @keyframes spin-ring{0%{box-shadow:0 0 0 2px var(--primary-glow)}50%{box-shadow:0 0 12px 4px var(--primary-glow)}100%{box-shadow:0 0 0 2px var(--primary-glow)}}
  .step-info{flex:1;min-width:0}
  .step-name{font-size:12px;font-weight:600;color:var(--text0);margin-bottom:3px;display:flex;align-items:center;gap:8px}
  .step-msg{font-size:10.5px;color:var(--text2);font-family:var(--mono);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .step-badge{font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 6px;border-radius:4px}
  .step-badge.running{background:var(--primary-dim);color:var(--primary)}
  .step-badge.done{background:var(--succ-dim);color:var(--success)}
  .step-badge.pending{background:var(--bg3);color:var(--text3)}
  .step-badge.error{background:var(--danger-dim);color:var(--danger)}
  .log-panel{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;height:580px}
  .log-header{padding:12px 16px;border-bottom:1px solid var(--border2);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px}
  .log-body{flex:1;overflow-y:auto;padding:12px 16px;font-family:var(--mono);font-size:11px;display:flex;flex-direction:column;gap:3px}
  .log-line{display:flex;gap:10px;animation:fadeIn .15s ease}
  .log-time{color:var(--text3);flex-shrink:0}
  .log-text{color:var(--text1);line-height:1.5}
  .log-text.success{color:var(--success)}
  .log-text.warn{color:var(--warning)}
  .log-text.error{color:var(--danger)}
  .log-text.info{color:#60a5fa}
  .progress-bar-wrap{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:20px}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#00a8ff);border-radius:2px;transition:width .4s ease}

  /* ─── Results ─── */
  .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:24px;overflow-x:auto}
  .tab-btn{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .tab-btn:hover{color:var(--text0)}
  .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
  .tab-count{font-size:10px;background:var(--bg3);padding:2px 6px;border-radius:10px;font-family:var(--mono)}
  .tab-btn.active .tab-count{background:var(--primary-dim);color:var(--primary)}

  /* ─── Stats ─── */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
  .stat-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 18px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--primary))}
  .stat-val{font-size:26px;font-weight:800;font-family:var(--mono);color:var(--text0);line-height:1;margin-bottom:4px}
  .stat-label{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.8px}
  .stat-sub{font-size:10px;color:var(--text3);margin-top:3px}

  /* ─── Exec summary ─── */
  .exec-box{background:linear-gradient(135deg,rgba(0,212,170,.06),rgba(124,58,237,.06));border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:22px}
  .exec-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--primary);font-weight:700;margin-bottom:8px}
  .exec-text{font-size:14px;line-height:1.7;color:var(--text0)}

  /* ─── Vuln table ─── */
  .vuln-table{width:100%;border-collapse:collapse}
  .vuln-table th{padding:9px 13px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap}
  .vuln-row{border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
  .vuln-row:hover{background:rgba(255,255,255,.02)}
  .vuln-row.expanded{background:rgba(0,212,170,.04)}
  .vuln-row td{padding:11px 13px;vertical-align:middle}
  .vuln-expand td{padding:16px 20px;background:var(--bg3);animation:slideDown .2s ease}
  @keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .rank-badge{width:26px;height:26px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text2)}
  .rank-badge.top3{background:rgba(245,158,11,.15);color:var(--warning)}
  .rank-badge.rank1{background:rgba(255,71,87,.15);color:var(--danger)}
  .cve-id{font-family:var(--mono);font-size:12px;color:var(--primary);font-weight:500}
  .pkg-chip{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:5px;background:var(--bg4);color:var(--text1);border:1px solid var(--border2)}
  .cvss-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap}
  .cvss-critical{background:rgba(255,71,87,.15);color:var(--danger);border:1px solid rgba(255,71,87,.25)}
  .cvss-high{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.25)}
  .cvss-medium{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
  .cvss-low{background:var(--succ-dim);color:var(--success);border:1px solid rgba(16,185,129,.25)}
  .cvss-pending{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.25)}
  .poc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:var(--mono);white-space:nowrap}
  .poc-yes{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.25)}
  .poc-no{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}
  .viability-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:var(--mono)}
  .v-high{background:rgba(255,71,87,.15);color:var(--danger);border:1px solid rgba(255,71,87,.25)}
  .v-medium{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.25)}
  .v-low{background:var(--succ-dim);color:var(--success);border:1px solid rgba(16,185,129,.25)}
  .score-pill{font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--primary-dim);color:var(--primary);border:1px solid rgba(0,212,170,.2)}
  .score-pill.high{background:rgba(255,71,87,.12);color:#ff7580;border-color:rgba(255,71,87,.2)}
  .score-pill.med{background:rgba(245,158,11,.12);color:#fbbf24;border-color:rgba(245,158,11,.2)}
  .blast-num{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--secondary)}
  .rationale-box{background:var(--bg2);border-left:3px solid var(--primary);padding:12px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:12.5px;line-height:1.65;color:var(--text1);margin-bottom:10px}
  .systems-list{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .system-chip{font-size:10px;font-family:var(--mono);padding:3px 8px;background:var(--sec-dim);color:#a78bfa;border-radius:4px;border:1px solid rgba(124,58,237,.2)}

  /* ─── Exploits tab ─── */
  .exploit-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
  .exploit-card-header{padding:14px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .exploit-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .exploit-code-wrap{position:relative}
  .exploit-code-wrap pre{margin:0!important;border-radius:0!important;max-height:400px;overflow-y:auto}
  .exploit-code-wrap code{font-family:var(--mono)!important;font-size:12px!important;line-height:1.6!important}
  .poc-generate-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:16px;background:var(--bg1);border-bottom:1px solid var(--border2)}
  .poc-generate-btn{display:flex;align-items:center;gap:10px;padding:12px 28px;border-radius:10px;border:1.5px solid var(--danger);background:rgba(255,71,87,.08);color:var(--danger);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;font-family:var(--sans)}
  .poc-generate-btn:hover{background:rgba(255,71,87,.18);box-shadow:0 0 18px rgba(255,71,87,.25)}
  .poc-generate-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
  .poc-lang-selector{display:flex;gap:8px}
  .poc-lang-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--mono);transition:all .15s}
  .poc-lang-btn.active{border-color:var(--danger);color:var(--danger);background:rgba(255,71,87,.08)}
  .poc-warning{font-size:11px;color:var(--text3);text-align:center;max-width:480px;line-height:1.5}
  .copy-btn{position:absolute;top:10px;right:10px;padding:4px 10px;font-size:10px;font-family:var(--mono);background:rgba(0,0,0,.5);color:var(--text2);border:1px solid var(--border2);border-radius:5px;cursor:pointer;transition:all .15s;z-index:10}
  .copy-btn:hover{color:var(--primary);border-color:var(--primary)}
  .exploit-eval{padding:16px 18px;border-top:1px solid var(--border2)}
  .eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:700px){.eval-grid{grid-template-columns:1fr}}
  .eval-section-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
  .eval-steps{display:flex;flex-direction:column;gap:5px}
  .eval-step{font-size:12px;color:var(--text1);padding:6px 10px;background:var(--bg3);border-radius:6px;border-left:2px solid var(--primary-dim);line-height:1.5}
  .eval-step.remediation{border-left-color:var(--warning)}
  .eval-step.verification{border-left-color:var(--success)}
  .lang-badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;font-weight:700}
  .lang-python{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
  .lang-bash{background:rgba(16,185,129,.15);color:var(--success);border:1px solid rgba(16,185,129,.25)}
  .lang-javascript{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.25)}
  .gen-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-weight:700}
  .gen-yes{background:var(--primary-dim);color:var(--primary);border:1px solid var(--border)}
  .gen-no{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}

  /* ─── Kanban ─── */
  .kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:800px){.kanban{grid-template-columns:1fr}}
  .kanban-col{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius)}
  .kanban-col-header{padding:12px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
  .kanban-col-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
  .col-dot{width:8px;height:8px;border-radius:50%}
  .kanban-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:100px}
  .ticket-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 13px;cursor:pointer;transition:all .15s;animation:slideIn .2s ease}
  .ticket-card:hover{border-color:var(--primary);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .ticket-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .ticket-id{font-family:var(--mono);font-size:10px;color:var(--text3)}
  .priority-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:var(--mono);text-transform:uppercase}
  .p-critical{background:rgba(255,71,87,.15);color:var(--danger)}
  .p-high{background:rgba(245,158,11,.15);color:var(--warning)}
  .p-medium{background:rgba(59,130,246,.15);color:#60a5fa}
  .p-low{background:var(--succ-dim);color:var(--success)}
  .ticket-cve{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--primary);margin-bottom:2px}
  .ticket-pkg{font-size:11px;color:var(--text2);margin-bottom:6px}
  .ticket-footer{display:flex;align-items:center;justify-content:space-between}
  .ticket-assignee{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
  .avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
  .ticket-date{font-size:10px;font-family:var(--mono);color:var(--text3)}

  /* ─── Calendar ─── */
  .cal-table{width:100%;border-collapse:collapse}
  .cal-table th{padding:9px 13px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);text-align:left;border-bottom:1px solid var(--border2)}
  .cal-table td{padding:10px 13px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
  .cal-table tr:hover td{background:rgba(255,255,255,.015)}
  .date-chip{font-family:var(--mono);font-size:12px;background:var(--bg3);padding:4px 9px;border-radius:6px;color:var(--text0)}
  .window-chip{font-family:var(--mono);font-size:11px;color:var(--text2)}

  /* ─── Dashboard ─── */
  .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:800px){.dashboard-grid{grid-template-columns:1fr}}
  .risk-chart-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .risk-chart-label{font-size:10px;color:var(--text2);width:90px;flex-shrink:0;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .risk-chart-bar{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden}
  .risk-chart-fill{height:100%;border-radius:4px;transition:width 1.2s ease;display:flex;align-items:center;padding-left:7px;font-size:9px;font-weight:700;font-family:var(--mono);color:rgba(0,0,0,.7)}
  .action-item{display:flex;gap:12px;align-items:flex-start;padding:12px 15px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2);margin-bottom:8px}
  .action-num{width:22px;height:22px;border-radius:50%;background:var(--primary-dim);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--primary);flex-shrink:0}
  .action-text{font-size:12.5px;color:var(--text1);line-height:1.5}

  /* ─── Misc ─── */
  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,170,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.03) 1px,transparent 1px);background-size:50px 50px}
  .content-wrap{position:relative;z-index:1}
  .scanning-overlay{position:fixed;inset:0;z-index:50;background:linear-gradient(180deg,transparent 0%,rgba(0,212,170,.03) 50%,transparent 100%);animation:scan-line 3s linear infinite;pointer-events:none}
  @keyframes scan-line{0%{background-position:0 -100vh}100%{background-position:0 200vh}}
  .spinner{width:14px;height:14px;border:2px solid rgba(0,212,170,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .modal-overlay{position:fixed;inset:0;background:rgba(4,9,18,.85);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:500px;max-width:90vw}
  .modal-title{font-size:16px;font-weight:700;color:var(--text0);margin-bottom:6px}
  .modal-sub{font-size:12.5px;color:var(--text2);margin-bottom:20px;line-height:1.5}
  .divider{border:none;border-top:1px solid var(--border2);margin:16px 0}
  .mt-8{margin-top:8px}
  .mt-12{margin-top:12px}
  .mt-16{margin-top:16px}
  .page-title{font-size:22px;font-weight:800;color:var(--text0);letter-spacing:-.4px}
  .page-sub{font-size:13px;color:var(--text2);margin-top:4px}
  .risk-delta-wrap{display:flex;gap:28px;align-items:center;margin-bottom:24px}
  .risk-bar-bg{height:26px;background:var(--bg3);border-radius:6px;overflow:hidden;flex:1}
  .risk-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;font-family:var(--mono);color:#fff;transition:width 1s ease}
  .risk-before{background:linear-gradient(90deg,var(--danger),#ff6b6b)}
  .risk-after{background:linear-gradient(90deg,var(--success),#34d399)}
  .source-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-family:var(--mono)}
  .source-va{background:var(--sec-dim);color:#a78bfa;border:1px solid rgba(124,58,237,.25)}
  .source-nvd{background:var(--blue-dim);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
  .source-osv{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.3)}
  .source-llm-fallback{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
  .source-demo{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}
</style>
</head>

<div id="root"></div>
<script type="text/babel" src="js/app-shared.js"></script>
<script type="text/babel" src="js/pages/configure-page.js"></script>
<script type="text/babel" src="js/pages/pipeline-page.js"></script>
<script type="text/babel" src="js/pages/results-page.js"></script>
<script type="text/babel" src="js/pages/team-page.js"></script>
<script type="text/babel" src="js/app.js"></script>
</body>
</html>
