services:
  - type: web
    name: vulnpriority-ai
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # you paste this in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVD_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.12
